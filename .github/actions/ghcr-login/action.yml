name: Login to GitHub Container Registry
description: Authenticate Docker with GHCR

inputs:
  username:
    required: true

  token:
    required: true

runs:
  using: composite
  steps:

    - name: Docker Login GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ inputs.username }}
        password: ${{ inputs.token }}