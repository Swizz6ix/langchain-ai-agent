name: Deploy Application

on:
    workflow_call:
        inputs:
            environment:
                required: true
                type: string

            image_tag:
                required: true
                type: string

        secrets:
            HOST:
                required: true

            USER:
                required: true

            SSH_KEY:
                required: true

            GHCR_USERNAME:
                required: true

            GHCR_TOKEN:
                required: true

permissions:
    contents: read
    packages: read
    id-token: write

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
    deploy:

        runs-on: ubuntu-latest

        environment:
            name: ${{ inputs.environment }}

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Install Cosign
              uses: sigstore/cosign-installer@v3.5.0

            - name: Log in Github Container Registry
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ secrets.GHCR_USERNAME }}
                password: ${{ secrets.GHCR_TOKEN }}

            - name: Verify Image Signature and Provenance
              run: |
                IMAGE="ghcr.io/${{ github.repository }}:${{ inputs.image_tag }}"
                echo "Verifying signature for $IMAGE..."
                
                # This ensures the image was signed by GitHub Actions, 
                # originating specifically from your repository
                cosign verify-attestation "$IMAGE" \
                  --type slsaprovenance
                  --type spdxjson
                  --certificate-identity-regexp "^https://github.com/${{ github.repository_owner }}/" \
                  --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

            - name: Copy deployment files
              uses: appleboy/scp-action@v0.1.7
              with:
                host: ${{ secrets.HOST }}
                username: ${{ secrets.USER }}
                key: ${{ secrets.SSH_KEY }}
                source: docker/
                target: ~/app

            - name: Deploy
              uses: appleboy/ssh-action@v1.2.0
              with:
                host: ${{ secrets.HOST }}
                username: ${{ secrets.USER }}
                key: ${{ secrets.SSH_KEY }}

                script: |
                    cd ~/app/docker

                    docker login ghcr.io \
                        -u ${{ secrets.GHCR_USERNAME }} \
                        -p ${{ secrets.GHCR_TOKEN }}

                    chmod +x deploy.sh

                    ./deploy.sh \
                    ghcr.io/${{ github.repository }} \
                    ${{ inputs.image_tag }}
                    https://${{ inputs.environment }}.example.com \
                    https://${{ inputs.environment }}.example.com
