name: Docker

on:
    pull_request:
        branches:
            - main

    push:
        branches:
            - main

    workflow_dispatch:

permissions:
    contents: read
    packages: write
    security-events: write
    id-token: write

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}
    IMAGE_TAG: test

jobs:
    docker-build:
        name: Build and Scan Docker Image
        runs-on: ubuntu-latest
        outputs:
            image: ${{ steps.image.outputs.image }}

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4


            #   Docker Setup
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3


            # Dockerfile Security
            - name: Lint Dockerfile
              uses: hadolint/hadolint-action@v3.1.0
            

            # Metadata
            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                images: ${{env.REGISTRY}}/${{ env.IMAGE_NAME }}
                tags: |
                    type=sha
                    type=ref,event=branch
                    type=ref,event=tag
                    type=semver,pattern={{version}}
                    type=semver,pattern={{major}}.{{minor}}
                    type=semver,pattern={{major}}

            # Covert to lower case
            - name: Normalize image name
              id: image-name
              shell: bash
              run: |
                IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
                echo "image_name=$IMAGE_NAME" >> "GITHUB_OUTPUT"

                
            # build image
            - name: Build Docker Image
              uses: docker/build-push-action@v6
              with:
                context: .
                file: Dockerfile
                load: true
                tags: |
                    ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}:test
                labels: ${{ steps.meta.outputs.labels }}

                cache-from: type=gha
                cache-to: type=gha,mode=max


                # Supply chain Security
                # This gives you:
                # SLSA provenance attestation
                # SPDX/CycloneDX-style SBOM metadata
                provenance: false
                sbom: false

            # Export image name
            - name: Set image ouput
              id: image
              run: |
                echo "image=${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}:\
                ${{ env.IMAGE_TAG }}"  >> $GITHUB_OUTPUT

            
            # Save Docker image
            - name: Save Docker image
              run: |
                docker save \
                    ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}:\
                    ${{ env.IMAGE_TAG }} -o docker-image.tar

            
            # Upload image artifact
            - name: Upload Docker image artifact
              uses: actions/upload-artifact@v4
              with:
                name: docker-image
                path: docker-image.tar
                retention-days: 1



    docker-scan:
        name: Scan Docker Image
        needs: 
            docker-build

        runs-on:
            ubuntu-latest

        steps:
            - name: Download Docker image
              uses: actions/download-artifact@v4
              with:
                name: docker-image

            - name: Load Docker image
              run: |
                docker load -i docker-image.tar

            # Scan Image for vulnerability scan
            - name: Scan Docker Image
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                image-ref: |
                    ${{ needs.docker-build.outputs.image }}
                format: sarif
                output: trivy-vulnerability.sarif
                severity: HIGH,CRITICAL
                ignore-unfixed: true
                exit-code: "1"

            
                # Trivy Misconfiguration   
            - name: Trivy Configuration Scan
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                scan-type: config
                hide-progress: true
                format: sarif
                output: trivy-config.sarif
                severity: trivy-config.sarif
                exit-code: "1"

            
            # Upload Security Reports
            - name: Upload Trivy Vulnerability Report
              if: always() && hashFiles('trivy-vulnerability') != ''
              uses: github/codeql-action/upload-sarif@v3
              with:
                sarif_file: trivy-vulnerability.sarif

            - name: Upload Trivy Config Results
              if: always() && hashFiles('trivy-vulnerability') != ''
              uses: github/codeql-action/upload-sarif@v3
              with:
                sarif_file: trivy-config.sarif


            # Export Reports
            - name: Upload Docker Security Reports
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: docker-security-reports
                path: |
                    trivy-vulnerability.sarif
                    trivy-config.sarif

                
    # push Image
    docker-push:
        name: Push Image to GHCR

        needs: 
            - docker-build
            - docker-scan

        if: github.event_name == 'push'

        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setupd\ Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Github Container Registry
              uses: ./.github/actions/ghcr-login
              with:
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                images: ghcr.io/${{ github.repository }}
                tags: |
                    type=sha
                    type=ref,event=branch
                    type=ref,event=tag
                    type=semver,pattern={{version}}
                    type=semver,pattern={{major}}.{{minor}}
                    type=semver,pattern={{major}}

            - name: Build and Push Image
              uses: docker/build-push-action@v6
              with:
                context: .
                push: true
                tags: ${{ steps.meta.outputs.tags }}
                labels: ${{ steps.meta.outputs.labels }}

                cache-from: type=gha
                cache-to: type=gha,mode=max


                # Supply chain security
                provenance: true
                sbom: true


    notify:
        needs: 
            - docker-build
            - docker-scan
            - docker-push

        if: always()

        uses: ./.github/workflows/notification.yml

        with:
            status: |
                build:${{ needs.docker-build.result }}
                scan:${{ needs.docker-scan.result }}
                push:${{ needs.docker-push.result }}

            environment: Development

            title: Docker Pipeline

            message: Docker image built, scanned and published successfully.

        secrets: inherit