name: Release
on:
  push:
    tags:

      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:


# Create Release
  release:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Version
        id: version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}



      # Pull Existing SHA Image
      - name: Get Commit SHA
        id: sha
        run: |
          echo "SHA=${GITHUB_SHA}" >> $GITHUB_OUTPUT


      # Promote Existing Image
      - name: Promote Docker Image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          docker pull \
          $IMAGE:sha-${{ github.sha }}

          docker tag \
          $IMAGE:sha-${{ github.sha }} \
          $IMAGE:${{ steps.version.outputs.VERSION }}

          docker tag \
          $IMAGE:sha-${{ github.sha }} \
          $IMAGE:stable

          docker push \
          $IMAGE:${{ steps.version.outputs.VERSION }}

          docker push \
          $IMAGE:stable




# GitHub Release
  github-release:

    needs: release

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |

            ## Docker Image
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}

            ## Changelog
            ${{ steps.changelog.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: github-release

    if: always()

    uses: ./.github/workflows/notifications.yml

    with:

        status: ${{ needs.github-release.result }}

        environment: Production

        title: Release Published

        message: Version released successfully.

    secrets: inherit
