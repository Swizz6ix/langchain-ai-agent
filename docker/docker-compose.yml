version: "3.9"
services:
  api:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    container_name: lanchain-agent

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      redis:
        condition: service_started

    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
